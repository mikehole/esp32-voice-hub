name: Build ESP-IDF Firmware

on:
  push:
    branches: [main]
    paths:
      - 'firmware/espidf/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:  # Manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.5.3

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Fix git ownership
        run: git config --global --add safe.directory /__w/esp32-voice-hub/esp32-voice-hub

      - name: Build firmware
        working-directory: firmware/espidf
        run: |
          . $IDF_PATH/export.sh
          idf.py build
          
      - name: Get version info
        id: version
        working-directory: firmware/espidf
        run: |
          VERSION=$(grep 'PROJECT_VER' build/project_description.json | cut -d'"' -f4 || echo "unknown")
          SHA=$(git rev-parse --short HEAD)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "sha=${SHA}" >> $GITHUB_OUTPUT
          echo "Built version: ${VERSION} (${SHA})"

      - name: Prepare release files
        run: |
          mkdir -p release
          cp firmware/espidf/build/esp32_voice_hub.bin release/
          cp firmware/espidf/build/bootloader/bootloader.bin release/
          cp firmware/espidf/build/partition_table/partition-table.bin release/

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: esp32-voice-hub-firmware
          path: release/
          retention-days: 30

      - name: Create/Update latest release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: Latest Build
          prerelease: true
          files: release/*
          body: |
            Latest firmware build from main branch.
            
            **OTA Update:**
            ```bash
            curl -X POST --data-binary "@esp32_voice_hub.bin" \
              "http://YOUR_DEVICE_IP/api/ota/upload" \
              -H "Content-Type: application/octet-stream"
            ```
            
            Or use the admin panel at `http://YOUR_DEVICE_IP/admin`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
